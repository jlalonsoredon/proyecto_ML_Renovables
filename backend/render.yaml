services:
  - type: web
    name: aeropredictor-backend
    env: python
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: AEMET_API_KEY
        sync: false
      - key: REE_API_KEY
        sync: false
      - key: DB_PATH
        value: data/ree_generacion.db
      - key: MODEL_PATH
        value: modelos/lr_eolica.joblib
    disk:
      - mountPath: /app/data
        name: aeropredictor-data
      - mountPath: /app/modelos
        name: aeropredictor-modelos